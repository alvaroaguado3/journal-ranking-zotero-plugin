<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Hexagon background -->
  <polygon points="48,4 88,26 88,70 48,92 8,70 8,26"
    fill="#2E6DA4" stroke="#1A4A7A" stroke-width="2"/>

  <!-- Magnifier circle -->
  <circle cx="42" cy="38" r="14" fill="none" stroke="white" stroke-width="5"/>

  <!-- Magnifier handle -->
  <line x1="52" y1="49" x2="64" y2="62" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Ruler / bars (ranking bars) -->
  <rect x="18" y="62" width="6" height="16" rx="1" fill="white" opacity="0.85"/>
  <rect x="27" y="56" width="6" height="22" rx="1" fill="white" opacity="0.85"/>
  <rect x="36" y="50" width="6" height="28" rx="1" fill="white" opacity="0.85"/>

  <!-- Small letter inside magnifier -->
  <text x="42" y="43" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-weight="bold" fill="white">JR</text>
</svg>
