name: Build XPI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and package XPI
        run: npm run package

      - name: Verify XPI was created
        run: |
          ls -lh *.xpi
          echo "XPI size: $(du -sh *.xpi | cut -f1)"

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: journal-ranking-zotero-plugin
          path: '*.xpi'
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and package XPI
        run: npm run package

      - name: Get version from manifest
        id: version
        run: echo "version=$(node -p "require('./manifest.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Journal Impact Ranking v${{ steps.version.outputs.version }}"
          body: |
            ## Installation

            1. Download `journal-ranking-zotero-plugin.xpi` below
            2. Open Zotero 8 → `Tools → Add-ons`
            3. Click the gear icon → `Install Add-on From File`
            4. Select the downloaded `.xpi` file and restart Zotero

            See [CHANGELOG.md](CHANGELOG.md) for what's new.
          files: '*.xpi'
          draft: false
          prerelease: false
